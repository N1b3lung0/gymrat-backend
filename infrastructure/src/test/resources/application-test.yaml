spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:tc:postgresql:17:///gymrat}
    username: ${SPRING_DATASOURCE_USERNAME:gymrat}
    password: ${SPRING_DATASOURCE_PASSWORD:gymrat}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

logging:
  level:
    org.flywaydb: DEBUG
